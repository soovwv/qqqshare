name: Release portable builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version without v prefix
        required: true
        default: 0.3.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build portable archives
        shell: pwsh
        run: |
          $version = if ('${{ github.ref_type }}' -eq 'tag') { '${{ github.ref_name }}'.TrimStart('v') } else { '${{ inputs.version }}' }
          ./scripts/release.ps1 -Version $version
      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.zip dist/checksums.txt --generate-notes --title "QQQShare ${{ github.ref_name }}"
      - uses: actions/upload-artifact@v7
        with:
          name: qqqshare-portable
          path: |
            dist/*.zip
            dist/checksums.txt
