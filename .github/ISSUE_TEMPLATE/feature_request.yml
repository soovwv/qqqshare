name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What human or AI-agent workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and scope impact
      description: Consider file access, tokens, expiry, LAN/internet scope, and agent permissions.
    validations:
      required: true
